name: bakahyou
description: "BakaHyou is an app for MangaBaka"
publish_to: 'none'
version: 1.0.0+1


environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  intl: ^0.20.2
  share_plus: ^13.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/mangabaka512.png"

flutter:
  assets:
    - .env
  uses-material-design: true
